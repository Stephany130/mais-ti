<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Receita</title>
</head>
<body>
    <header align="center">
        <h1>💵 Editar Receita</h1>
        <nav>
             <a href="receitas.html">Voltar aos Contatos</a>
        </nav>
    </header>
    <hr>
    <main>
          <div align="center">
            <h2>Formulário de Edição de Contato</h2>
            <form>
                <div>
                    <label><b>ID:</b></label>
                    <input type="text" value="1" disabled>
                </div>
                
                <div>
                    <label><b>Apartamento:</b></label>
                    <input type="number" value="Deixe em branco se não aplicável" step="0.01">" required>
                </div>
                
                <div>
                    <label><b>Descrição:</b></label>
                    <input type="text" value="Contribuição Mensaç" required>
                </div>
                
                <div>
                    <label><b>Valor:</b></label>
                    <input type="number" placeholder="Deixe em branco se não aplicável" step="0.01">
                </div>
                
                <div>
                    <label><b>Vencimento:</b></label>
                    <input type="text" value="Rua A, 100 - Fortaleza" required>
                </div>
                
                <div>
                    <label><b>Pago:</b></label>
                    <textarea>Serviços Hidráulicos</textarea>
                </div>
                
                <div>
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="window.location.href='contatos.html'">Cancelar</button>
                
                <div>
                    <label><b>Pago:</b></label>
                    <select required>
                        <option value="nao">Não</option>
                        <option value="sim" selected>Sim</option>
                    </select>
                </div>
                
                
                <div>
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="window.location.href='despesas.html'">Cancelar</button>
                </div>
            </form>
        </div>
    </main>
    <hr>
    <footer align="center">
        <small>Sistema de Gestão do Condomínio</small>
    </footer>
</body>
</html>
